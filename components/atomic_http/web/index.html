<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenNasalance</title>
<style>
  body { font: 14px/1.4 system-ui, sans-serif; margin: 1.5em; color: #222; background: #fafafa; }
  h1 { font-size: 1.2em; margin: 0 0 0.5em; }
  .row { display: flex; gap: 0.5em; margin: 0.15em 0; align-items: baseline; }
  .k { width: 9em; color: #666; }
  .v { font-variant-numeric: tabular-nums; }
  .ok { color: #2a7a2a; }
  .bad { color: #b22; }
  .specwrap { display: grid; grid-template-columns: 4em 1fr; gap: 0.5em; align-items: center; margin: 0.6em 0; }
  .speclabel { color: #666; font-size: 0.85em; }
  canvas { background: #000; image-rendering: pixelated; width: 100%; height: 160px; display: block; border: 1px solid #ccc; }
  .meters { display: grid; grid-template-columns: 4em 1fr 4em; gap: 0.5em; align-items: center; margin: 0.3em 0; }
  .bar { background: #eee; height: 0.7em; border: 1px solid #ccc; }
  .bar > div { height: 100%; background: #2a7a2a; }
  pre { background: #fff; border: 1px solid #ddd; padding: 0.5em; max-height: 8em; overflow: auto; font-size: 0.85em; }
</style>
</head>
<body>
<h1>OpenNasalance</h1>
<div class="row"><span class="k">connection</span><span id="status" class="v bad">connecting…</span></div>
<div class="row"><span class="k">unit</span><span id="unit" class="v">—</span></div>
<div class="row"><span class="k">device uptime</span><span id="uptime" class="v">—</span></div>
<div class="row"><span class="k">frames recv'd</span><span id="frames" class="v">0</span></div>
<div class="row"><span class="k">frames dropped</span><span id="drops" class="v">0</span></div>
<div class="row"><span class="k">nasalance</span><span id="nasal" class="v">—</span></div>

<div class="specwrap"><span class="speclabel">mic 1</span><canvas id="cv1" width="320" height="129"></canvas></div>
<div class="meters"><span class="speclabel">amp 1</span><div class="bar"><div id="amp1" style="width:0%"></div></div><span class="v" id="amp1v">0</span></div>

<div class="specwrap"><span class="speclabel">mic 2</span><canvas id="cv2" width="320" height="129"></canvas></div>
<div class="meters"><span class="speclabel">amp 2</span><div class="bar"><div id="amp2" style="width:0%"></div></div><span class="v" id="amp2v">0</span></div>

<h2 style="font-size:1em;margin:1.2em 0 0.4em;">log</h2>
<pre id="log"></pre>

<script>
  const $ = (id) => document.getElementById(id);
  const log = (s) => { const p = $("log"); p.textContent += s + "\n"; p.scrollTop = p.scrollHeight; };
  const fmt = (sec) => {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    return `${h}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`;
  };

  // viridis-ish 256-step LUT, computed once
  const LUT = (() => {
    const a = new Uint8ClampedArray(256 * 4);
    for (let i = 0; i < 256; i++) {
      const t = i / 255;
      // crude perceptual ramp: dark blue → cyan → yellow → red
      const r = Math.round(255 * Math.min(1, Math.max(0, 1.5 * t - 0.5)));
      const g = Math.round(255 * Math.min(1, Math.max(0, t < 0.5 ? 2 * t : 2 - 2 * t + 0.4)));
      const b = Math.round(255 * Math.min(1, Math.max(0, 1 - 1.8 * t)));
      a[i*4]=r; a[i*4+1]=g; a[i*4+2]=b; a[i*4+3]=255;
    }
    return a;
  })();

  function makeSpec(canvas) {
    const ctx = canvas.getContext("2d", { alpha: false });
    const W = canvas.width, H = canvas.height;
    const img = ctx.createImageData(W, H);
    // initialize black
    for (let i = 0; i < img.data.length; i += 4) img.data[i+3] = 255;
    ctx.putImageData(img, 0, 0);
    return { canvas, ctx, W, H, img };
  }

  function pushColumn(s, bins) {
    // shift left by 1px in the ImageData buffer, write new column on right
    const { W, H, img } = s;
    const d = img.data;
    const rowBytes = W * 4;
    for (let y = 0; y < H; y++) {
      const base = y * rowBytes;
      d.copyWithin(base, base + 4, base + rowBytes);
    }
    const x = W - 1;
    // bins[0] = MIN_BIN (low freq) → display at bottom; flip y
    const N = bins.length;
    for (let y = 0; y < H; y++) {
      const fpos = (H - 1 - y) / (H - 1);   // 0 at top, 1 at bottom
      const b = Math.min(N - 1, Math.max(0, Math.round(fpos * (N - 1))));
      const v = bins[b];
      const off = (y * W + x) * 4;
      const li = v * 4;
      d[off]   = LUT[li];
      d[off+1] = LUT[li+1];
      d[off+2] = LUT[li+2];
      d[off+3] = 255;
    }
    s.ctx.putImageData(img, 0, 0);
  }

  const spec1 = makeSpec($("cv1"));
  const spec2 = makeSpec($("cv2"));

  let frames = 0, drops = 0, lastIdx = null;

  function handleBinary(buf) {
    const dv = new DataView(buf);
    if (buf.byteLength < 8) { log("short binary frame: " + buf.byteLength); return; }
    const type = dv.getUint8(0);
    const ver  = dv.getUint8(1);
    const idx  = dv.getUint16(2, true);
    const nb   = dv.getUint8(4);
    const ampT = dv.getUint8(5);
    const ampB = dv.getUint8(6);
    const nas  = dv.getUint8(7);
    if (type !== 1 || ver !== 1) { log(`unknown frame type=${type} ver=${ver}`); return; }
    if (buf.byteLength < 8 + 2 * nb) { log("truncated frame"); return; }

    // Resize spec canvases if device sends a different bin count than we expect
    if (spec1.canvas.height !== nb) {
      spec1.canvas.height = nb;
      spec2.canvas.height = nb;
      Object.assign(spec1, makeSpec(spec1.canvas));
      Object.assign(spec2, makeSpec(spec2.canvas));
    }

    const top = new Uint8Array(buf, 8, nb);
    const bot = new Uint8Array(buf, 8 + nb, nb);
    pushColumn(spec1, top);
    pushColumn(spec2, bot);

    if (lastIdx !== null) {
      const expected = (lastIdx + 1) & 0xFFFF;
      if (idx !== expected) {
        const d = (idx - expected) & 0xFFFF;
        drops += d;
        $("drops").textContent = drops;
      }
    }
    lastIdx = idx;
    frames++;
    if ((frames & 0x7) === 0) $("frames").textContent = frames;

    $("amp1").style.width = (ampT * 100 / 255).toFixed(0) + "%";
    $("amp2").style.width = (ampB * 100 / 255).toFixed(0) + "%";
    $("amp1v").textContent = ampT;
    $("amp2v").textContent = ampB;
    $("nasal").textContent = (nas === 255) ? "—" : nas + "%";
  }

  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = "arraybuffer";
  ws.onopen  = () => { $("status").textContent = "connected"; $("status").className = "v ok"; log("ws open"); };
  ws.onclose = () => { $("status").textContent = "closed";    $("status").className = "v bad"; log("ws close"); };
  ws.onerror = ()  => log("ws error");
  ws.onmessage = (e) => {
    if (typeof e.data === "string") {
      try {
        const m = JSON.parse(e.data);
        if (m.type === "hello") $("unit").textContent = m.unit;
        else if (m.type === "heartbeat") $("uptime").textContent = fmt(m.uptime);
      } catch (err) { log("bad json: " + e.data); }
    } else {
      handleBinary(e.data);
    }
  };
</script>
</body>
</html>
